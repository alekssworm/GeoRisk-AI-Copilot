name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run lint
        run: uv run --with-requirements requirements-dev.txt ruff check .

      - name: Check formatting
        run: uv run --with-requirements requirements-dev.txt ruff format --check .

      - name: Run tests
        run: uv run --with-requirements requirements-dev.txt pytest
